<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>
<link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="container">

<h1>Student Dashboard</h1>

<!-- Percentage -->
<div class="card center">
<h2>Attendance Percentage</h2>
<h1 id="percent">82%</h1>
</div>

<!-- Subject wise -->
<div class="card">
<h2>Subject-wise Attendance</h2>

<div class="subject">
<span>Math</span>
<div class="bar"><div style="width:90%"></div></div>
</div>

<div class="subject">
<span>Science</span>
<div class="bar"><div style="width:75%"></div></div>
</div>

<div class="subject">
<span>English</span>
<div class="bar"><div style="width:60%"></div></div>
</div>

</div>

<!-- Scan History -->
<div class="card">
<h2>Scan History</h2>
<ul class="history">
<li>Math — Present — 10:00 AM</li>
<li>Science — Present — 11:00 AM</li>
<li>English — Absent</li>
</ul>
</div>

</div>

</body>
</html>
