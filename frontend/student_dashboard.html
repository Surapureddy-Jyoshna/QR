 <!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>

<style>
body{
    font-family: Arial;
    background:#f4f7fb;
    margin:0;
}

/* HEADER */
.header{
    background:#2563eb;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h2{
    margin:0;
}

.logout-btn{
    background:#ef4444;
    border:none;
    padding:8px 14px;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

/* MAIN */
.container{
    padding:30px;
    max-width:900px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.info{
    margin:8px 0;
}

.attendance-box{
    background:#e0f2fe;
    padding:15px;
    border-radius:8px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

.teacher-card{
    background:#f1f5f9;
    padding:12px;
    border-radius:8px;
    margin-bottom:10px;
}
</style>

</head>

<body>

<div class="header">
    <h2>🎓 Student Dashboard</h2>
    <button id="studentLogout" class="logout-btn">Logout</button>
</div>

<div class="container">

    <div class="card">
        <div class="info"><b>Name:</b> <span id="name"></span></div>
        <div class="info"><b>Email:</b> <span id="email"></span></div>
        <div class="info"><b>Student ID:</b> <span id="studentId"></span></div>
    </div>

    <div class="card attendance-box">
        Attendance: <span id="attendance"></span> %
    </div>

    <div class="card">
        <h3>Attendance by Teacher</h3>
        <div id="history"></div>
    </div>

</div>

<script>
const studentId = localStorage.getItem("studentId");

// PROFILE
fetch("https://qr-1-jep5.onrender.com/student/" + studentId)
.then(res => res.json())
.then(data => {
    document.getElementById("name").innerText = data.name;
    document.getElementById("email").innerText = data.email;
    document.getElementById("studentId").innerText = data.studentId;
});

// ATTENDANCE
fetch("https://qr-1-jep5.onrender.com/student/attendance/" + studentId)
.then(res => res.json())
.then(data => {

    document.getElementById("attendance").innerText = data.overall;

    const div = document.getElementById("history");

    data.teachers.forEach(t => {

        const card = document.createElement("div");
        card.className = "teacher-card";

        card.innerHTML = `
            <b>👨‍🏫 ${t.teacherName}</b><br>
            Attendance: <b>${t.percentage}%</b><br>
            Classes: ${t.attended}/${t.totalClasses}
        `;

        div.appendChild(card);
    });

});

// LOGOUT
document.getElementById("studentLogout")
.addEventListener("click", function(){
    localStorage.removeItem("studentId");
    window.location.href = "index.html";
});
</script>

</body>
</html>
