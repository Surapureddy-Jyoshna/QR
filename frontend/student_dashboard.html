<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background: linear-gradient(135deg, #e0ecff, #f7f9ff);
}

/* HEADER */
.header{
    background: linear-gradient(90deg, #4f46e5, #2563eb);
    color:white;
    padding:18px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logout-btn{
    background:#ef4444;
    border:none;
    padding:10px 16px;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

/* CONTAINER */
.container{
    max-width:1100px;
    margin:30px auto;
    padding:20px;
}

/* GRID LAYOUT */
.top-section{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.bottom-section{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-top:20px;
}

/* RESPONSIVE */
@media(max-width:768px){
    .top-section,
    .bottom-section{
        grid-template-columns:1fr;
    }
}

/* CARD */
.card{
    background:rgba(255,255,255,0.8);
    backdrop-filter: blur(12px);
    padding:20px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

/* PROFILE */
.profile{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.avatar{
    width:70px;
    height:70px;
    border-radius:50%;
    background:#2563eb;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
}

/* ATTENDANCE */
.attendance-box{
    text-align:center;
}

.circle{
    width:140px;
    height:140px;
    border-radius:50%;
    background: conic-gradient(#2563eb var(--value), #e5e7eb 0);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
}

.circle span{
    background:white;
    width:110px;
    height:110px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
}

/* ML CARD */
.ml-btn-modern{
    margin-top:15px;
    background:linear-gradient(90deg,#2563eb,#7c3aed);
    color:white;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.ml-btn-modern:hover{
    transform:scale(1.05);
}

/* TEACHER */
.teacher-card{
    background:#f1f5f9;
    padding:12px;
    border-radius:10px;
    margin-top:10px;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.modal-box{
    background:white;
    padding:25px;
    border-radius:16px;
    width:320px;
    text-align:center;
}

.input-group input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

.predict-btn{
    width:100%;
    padding:10px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.close-btn{
    margin-top:10px;
    padding:8px;
    border:none;
    background:#ddd;
    border-radius:8px;
    cursor:pointer;
}

.ml-result-box{
    margin-top:10px;
    background:#f1f5f9;
    padding:10px;
    border-radius:8px;
}

.low{color:red;}
.avg{color:orange;}
.good{color:green;}

</style>
</head>

<body>

<div class="header">
    <h2>🎓 Student Dashboard</h2>
    <button id="studentLogout" class="logout-btn">Logout</button>
</div>

<div class="container">

    <!-- TOP -->
    <div class="top-section">

        <div class="card profile">
            <div>
                <p><b>Name:</b> <span id="name"></span></p>
                <p><b>Email:</b> <span id="email"></span></p>
                <p><b>ID:</b> <span id="studentId"></span></p>
            </div>
            <div class="avatar">👤</div>
        </div>

        <div class="card attendance-box">
            <h3>Overall Attendance</h3>
            <div class="circle" id="circle">
                <span id="attendance">0%</span>
            </div>
        </div>

    </div>

    <!-- BOTTOM -->
    <div class="bottom-section">

        <div class="card">
            <h3>🤖 Attendance Predictor</h3>
            <button class="ml-btn-modern" onclick="openMLModal()">Predict Now</button>
        </div>

        <div class="card">
            <h3>📊 Attendance by Teacher</h3>
            <div id="history"></div>
        </div>

    </div>

</div>

<!-- MODAL -->
<div id="mlModal" class="modal">
  <div class="modal-box">
    <h3>Attendance Predictor</h3>

    <div class="input-group">
      <input id="totalInput" placeholder="Total Classes">
      <input id="percentInput" placeholder="Attendance %">
    </div>

    <button class="predict-btn" onclick="calculatePrediction()">Predict</button>
    <div id="mlOutput" class="ml-result-box"></div>
    <button class="close-btn" onclick="closeMLModal()">Close</button>
  </div>
</div>

<script>
const studentId = localStorage.getItem("studentId");

// PROFILE
fetch("https://qr-1-jep5.onrender.com/student/" + studentId)
.then(res => res.json())
.then(data => {
    name.innerText = data.name;
    email.innerText = data.email;
    studentId.innerText = data.studentId;
});

// ATTENDANCE
fetch("https://qr-1-jep5.onrender.com/student/attendance/" + studentId)
.then(res => res.json())
.then(data => {
    const percent = data.overall;
    attendance.innerText = percent + "%";
    circle.style.setProperty("--value", percent + "%");

    data.teachers.forEach(t => {
        const div = document.createElement("div");
        div.className="teacher-card";
        div.innerHTML=`${t.teacherName} - <b>${t.percentage}%</b>`;
        history.appendChild(div);
    });
});

// MODAL
function openMLModal(){
    mlModal.style.display="flex";
}

function closeMLModal(){
    mlModal.style.display="none";
    totalInput.value="";
    percentInput.value="";
    mlOutput.innerHTML="";
}

// PREDICTION
function calculatePrediction(){
    const total = parseFloat(totalInput.value);
    const percent = parseFloat(percentInput.value);

    const attended = Math.round((percent/100)*total);

    fetch("https://qr-1-jep5.onrender.com/student/ml-predict",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({total, attended})
    })
    .then(res=>res.json())
    .then(data=>{
        mlOutput.innerHTML=`Need <b>${data.needed}</b> classes`;
    });
}

// CLOSE OUTSIDE
window.onclick = function(e){
    if(e.target===mlModal) closeMLModal();
};

// LOGOUT
studentLogout.onclick = ()=>{
    localStorage.removeItem("studentId");
    location.href="index.html";
};
</script>

</body>
</html>
