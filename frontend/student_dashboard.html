 <!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background: linear-gradient(135deg, #e0ecff, #f7f9ff);
}

/* HEADER */
.header{
    background: linear-gradient(90deg, #4f46e5, #2563eb);
    color:white;
    padding:18px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.header h2{
    font-weight:600;
}

.logout-btn{
    background:#ef4444;
    border:none;
    padding:10px 16px;
    color:white;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.logout-btn:hover{
    background:#dc2626;
}

/* CONTAINER */
.container{
    max-width:1000px;
    margin:40px auto;
    padding:20px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.7);
    backdrop-filter: blur(12px);
    padding:20px;
    border-radius:16px;
    margin-bottom:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    transition:0.3s;
}

.card:hover{
    transform: translateY(-4px);
}

/* PROFILE */
.profile{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.profile-info{
    line-height:1.8;
}

.avatar{
    width:70px;
    height:70px;
    border-radius:50%;
    background:#2563eb;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:28px;
}

/* ATTENDANCE */
.attendance-box{
    text-align:center;
}

.circle{
    width:140px;
    height:140px;
    border-radius:50%;
    background: conic-gradient(#2563eb var(--value), #e5e7eb 0);
    display:flex;
    align-items:center;
    justify-content:center;
    margin: auto;
}

.circle span{
    background:white;
    width:110px;
    height:110px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    font-weight:bold;
}

/* TEACHER CARD */
.teacher-card{
    padding:14px;
    border-radius:10px;
    margin-bottom:12px;
    background:#f1f5f9;
    transition:0.3s;
}

.teacher-card:hover{
    background:#e2e8f0;
}

/* STATUS COLORS */
.low{ color:red; }
.avg{ color:orange; }
.good{ color:green; }

</style>
</head>

<body>

<div class="header">
    <h2>🎓 Student Dashboard</h2>
    <button id="studentLogout" class="logout-btn">Logout</button>
</div>

<div class="container">

    <!-- PROFILE -->
    <div class="card profile">
        <div class="profile-info">
            <p><b>Name:</b> <span id="name"></span></p>
            <p><b>Email:</b> <span id="email"></span></p>
            <p><b>ID:</b> <span id="studentId"></span></p>
        </div>
        <div class="avatar">👤</div>
    </div>

    <!-- ATTENDANCE -->
    <div class="card attendance-box">
        <h3>Overall Attendance</h3>
        <div class="circle" id="circle">
            <span id="attendance">0%</span>
        </div>
    </div>

    <!-- TEACHERS -->
    <div class="card">
        <h3>📊 Attendance by Teacher</h3>
        <div id="history"></div>
    </div>

</div>

<script>
const studentId = localStorage.getItem("studentId");

// PROFILE
fetch("https://qr-1-jep5.onrender.com/student/" + studentId)
.then(res => res.json())
.then(data => {
    document.getElementById("name").innerText = data.name;
    document.getElementById("email").innerText = data.email;
    document.getElementById("studentId").innerText = data.studentId;
});

// ATTENDANCE
fetch("https://qr-1-jep5.onrender.com/student/attendance/" + studentId)
.then(res => res.json())
.then(data => {

    const percent = data.overall;
    document.getElementById("attendance").innerText = percent + "%";

    // 🔥 Circle progress
    document.getElementById("circle")
        .style.setProperty("--value", percent + "%");

    const div = document.getElementById("history");

    data.teachers.forEach(t => {

        let statusClass = "good";
        if(t.percentage < 75) statusClass = "low";
        else if(t.percentage < 85) statusClass = "avg";

        const card = document.createElement("div");
        card.className = "teacher-card";

        card.innerHTML = `
            <b>👨‍🏫 ${t.teacherName}</b><br>
            Attendance: <b class="${statusClass}">
                ${t.percentage}%
            </b><br>
            Classes: ${t.attended}/${t.totalClasses}
        `;

        div.appendChild(card);
    });

});

// LOGOUT
document.getElementById("studentLogout")
.addEventListener("click", function(){
    localStorage.removeItem("studentId");
    window.location.href = "index.html";
});
</script>

</body>
</html>
