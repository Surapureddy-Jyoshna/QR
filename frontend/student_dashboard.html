<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background: linear-gradient(135deg, #e0ecff, #f7f9ff);
}

/* HEADER */
.header{
    background: linear-gradient(90deg, #4f46e5, #2563eb);
    color:white;
    padding:18px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* CONTAINER */
.container{
    max-width:1100px;
    margin:40px auto;
    padding:20px;
}

/* GRID LAYOUT */
.top-section{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.bottom-section{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-top:20px;
}

@media(max-width:768px){
    .top-section,
    .bottom-section{
        grid-template-columns:1fr;
    }
}

/* CARD */
.card{
    background:rgba(255,255,255,0.7);
    backdrop-filter: blur(12px);
    padding:20px;
    border-radius:16px;
    margin-bottom:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    transition:0.3s;
}

.card:hover{
    transform: translateY(-4px);
}

/* PROFILE */
.profile{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.avatar{
    width:70px;
    height:70px;
    border-radius:50%;
    background:#2563eb;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
}

/* ATTENDANCE */
.attendance-box{
    text-align:center;
}

.circle{
    width:140px;
    height:140px;
    border-radius:50%;
    background: conic-gradient(#2563eb var(--value), #e5e7eb 0);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
}

.circle span{
    background:white;
    width:110px;
    height:110px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
}

/* TEACHER CARD */
.teacher-card{
    padding:14px;
    border-radius:10px;
    margin-bottom:12px;
    background:#f1f5f9;
}

.low{ color:red; }
.avg{ color:orange; }
.good{ color:green; }

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  z-index:1000;
  justify-content:center;
  align-items:center;
}

.ml-modal-box{
  background:white;
  padding:25px;
  width:340px;
  border-radius:16px;
  text-align:center;
}

/* INPUT */
.input-group input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* BUTTONS */
.predict-btn{
  width:100%;
  padding:10px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.close-btn{
  margin-top:10px;
  padding:8px;
  border:none;
  background:#ddd;
  border-radius:8px;
  cursor:pointer;
}

.ml-result-box{
  margin-top:10px;
  background:#f1f5f9;
  padding:10px;
  border-radius:8px;
}

.ml-btn-modern{
  margin-top:15px;
  background:linear-gradient(90deg,#2563eb,#7c3aed);
  color:white;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
    <h2>🎓 Student Dashboard</h2>
    <button id="studentLogout">Logout</button>
</div>

<div class="container">

    <!-- TOP SECTION -->
    <div class="top-section">

        <!-- PROFILE -->
        <div class="card profile">
            <div>
                <p><b>Name:</b> <span id="name"></span></p>
                <p><b>Email:</b> <span id="email"></span></p>
                <p><b>ID:</b> <span id="studentId"></span></p>
            </div>
            <div class="avatar">👤</div>
        </div>

        <!-- ATTENDANCE -->
        <div class="card attendance-box">
            <h3>Overall Attendance</h3>
            <div class="circle" id="circle">
                <span id="attendance">0%</span>
            </div>
        </div>

    </div>

    <!-- BOTTOM SECTION -->
    <div class="bottom-section">

        <!-- PREDICTOR -->
        <div class="card">
            <h3>🤖 Attendance Predictor</h3>
            <p>Check how many classes you need</p>
            <button class="ml-btn-modern" onclick="openMLModal()">
                Predict Now
            </button>
        </div>

        <!-- TEACHERS -->
        <div class="card">
            <h3>📊 Attendance by Teacher</h3>
            <div id="history"></div>
        </div>

    </div>

</div>

<!-- MODAL -->
<div id="mlModal" class="modal">
  <div class="ml-modal-box">

    <h3>Attendance Predictor</h3>

    <div class="input-group">
      <input id="totalInput" placeholder="Total Classes Conducted">
      <input id="percentInput" placeholder="Current Attendance (%)">
    </div>

    <button class="predict-btn" onclick="calculatePrediction()">Predict</button>

    <div id="mlOutput" class="ml-result-box"></div>

    <button class="close-btn" onclick="closeMLModal()">Close</button>

  </div>
</div>

<script>
const studentId = localStorage.getItem("studentId");

/* PROFILE */
fetch("https://qr-1-jep5.onrender.com/student/" + studentId)
.then(res => res.json())
.then(data => {
    document.getElementById("name").innerText = data.name;
    document.getElementById("email").innerText = data.email;
    document.getElementById("studentId").innerText = data.studentId;
});

/* ATTENDANCE */
fetch("https://qr-1-jep5.onrender.com/student/attendance/" + studentId)
.then(res => res.json())
.then(data => {

    const percent = data.overall;
    document.getElementById("attendance").innerText = percent + "%";

    document.getElementById("circle")
        .style.setProperty("--value", percent + "%");

    const div = document.getElementById("history");

    data.teachers.forEach(t => {

        let statusClass = "good";
        if(t.percentage < 75) statusClass = "low";
        else if(t.percentage < 85) statusClass = "avg";

        const card = document.createElement("div");
        card.className = "teacher-card";

        card.innerHTML = `
            <b>${t.teacherName}</b><br>
            Attendance: <b class="${statusClass}">
                ${t.percentage}%
            </b><br>
            Classes: ${t.attended}/${t.totalClasses}
        `;

        div.appendChild(card);
    });

});

/* MODAL */
function openMLModal(){
  document.getElementById("mlModal").style.display = "flex";
}

function closeMLModal(){
  document.getElementById("mlModal").style.display = "none";
  document.getElementById("totalInput").value = "";
  document.getElementById("percentInput").value = "";
  document.getElementById("mlOutput").innerHTML = "";
}

function calculatePrediction(){

  const total = parseFloat(document.getElementById("totalInput").value);
  const percent = parseFloat(document.getElementById("percentInput").value);

  if(isNaN(total) || isNaN(percent)){
    document.getElementById("mlOutput").innerText = "Enter valid numbers";
    return;
  }

  const attended = Math.round((percent / 100) * total);

  fetch("https://qr-1-jep5.onrender.com/student/ml-predict", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ total, attended })
  })
  .then(res => res.json())
  .then(data => {

    if(data.error){
      document.getElementById("mlOutput").innerText = data.error;
      return;
    }

    document.getElementById("mlOutput").innerHTML =
      `Need <b>${data.needed}</b> classes`;
  })
  .catch(()=>{
    document.getElementById("mlOutput").innerText = "Server error";
  });
}


window.onclick = function(e){
  const modal = document.getElementById("mlModal");
  if(e.target === modal){
    closeMLModal();
  }
};

document.getElementById("studentLogout").onclick = function(){
    localStorage.removeItem("studentId");
    window.location.href = "index.html";
};
</script>

</body>
</html>
