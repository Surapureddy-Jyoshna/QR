<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="student_login.css">
</head>
<body>

<div class="card">

<h2>Student Login</h2>

<form id="studentLoginForm">

<div class="input-box">
<label>Student ID</label>
<input type="text" id="studentId" placeholder="Enter Student ID">

<div class="error" id="rollError">Roll number required</div>
</div>

<div class="input-box password-wrap">
<label>Password</label>
<input type="password" id="password" placeholder="Enter password">
<span class="toggle" onclick="togglePass()">Show</span>
<div class="error" id="passError">Password required</div>
</div>

<button type="submit">Login</button>

</form>

<a href="index.html" class="back">← Back to Home</a>

</div>
<script>
function togglePass(){
    let p=document.getElementById("password");
    p.type=p.type==="password"?"text":"password";
}
</script>

<script src="student_login.js"></script>

</body>
</html>
