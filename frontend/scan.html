<!DOCTYPE html>
<html>
<head>
<title>Mark Attendance</title>
<link rel="stylesheet" href="scan.css">
</head>
<body>

    <div class="container">
      <div class="card">
    
        <h2>Attendance Verification</h2>
    
        <form id="attendanceForm">
          <input type="text" id="studentName" placeholder="Enter Name" required>
          <input type="text" id="studentId" placeholder="Enter ID" required>
          <button type="submit">Mark Attendance</button>
        </form>
    
        <p id="msg"></p>
    
      </div>
    </div>
</body>    

<script>
const params = new URLSearchParams(window.location.search);
const sessionId = params.get("session");

const studentId = localStorage.getItem("studentId");

if(!sessionId || !studentId){
    document.body.innerHTML="<h2>Invalid Access</h2>";
}

// 🔥 CALL BACKEND DIRECTLY (NO FORM NEEDED)
fetch("https://qr-attendance-1-odo4.onrender.com/student/mark-attendance", {
    method:"POST",
    headers:{
        "Content-Type":"application/json"
    },
    body: JSON.stringify({
        sessionId,
        studentId
    })
})
.then(res=>res.json())
.then(data=>{

    if(data.success){
        document.body.innerHTML=`
        <h2 style="color:green;">✅ Attendance Marked</h2>
        <p>Time: ${data.time}</p>
        `;
    }else{
        document.body.innerHTML=`
        <h2 style="color:red;">❌ ${data.message}</h2>
        `;
    }

});
</script>

</html>
